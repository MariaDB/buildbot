# -*- python -*-
# ex: set filetype=python:

# git branch filter using fnmatch
import fnmatch
import os

from buildbot.plugins import schedulers, util
from constants import BRANCHES_MAIN
from flask import Flask, render_template
from master_common import base_master_config

# Load the slave, database passwords and 3rd-party tokens from an external
# private file, so that the rest of the configuration can be public.
config = {"private": {}}
exec(open("master-private.cfg").read(), config, {})

# This is the dictionary that the buildmaster pays attention to. We also use
# a shorter alias to save typing.
port = int(os.getenv("PORT", default="8010"))
c = BuildmasterConfig = base_master_config(
    title=os.getenv("TITLE", default="MariaDB CI"),
    title_url=os.getenv("TITLE_URL", default="https://github.com/MariaDB/server"),
    buildbot_url=os.getenv("BUILDMASTER_URL", default="https://buildbot.mariadb.org/"),
    github_access_token=config["private"]["gh_mdbci"]["access_token"],
    # TODO(cvicentiu) undo this hardcoding
    secrets_provider_file=os.getenv(
        "MASTER_CREDENTIALS_DIR",
        default="/srv/buildbot/master/master-credential-provider",
    ),
    master_port=port,
    db_url=config["private"]["db_url"],
    mq_router_url=os.getenv("MQ_ROUTER_URL", default="ws://localhost:8085/ws"),
)


# minimalistic config to activate web UI
c["www"] = dict(
    port=port,
    plugins=dict(waterfall_view={}, console_view={}, grid_view={}),
    custom_templates_dir="templates",
)

# Github Auth, allow control for MariaDB affiliated accounts
c["www"]["authz"] = util.Authz(
    allowRules=[util.AnyControlEndpointMatcher(role="MariaDB", defaultDeny=True)],
    roleMatchers=[util.RolesFromGroups()],
)
c["www"]["auth"] = util.GitHubAuth(
    config["private"]["gh_mdbauth"]["client"], config["private"]["gh_mdbauth"]["secret"]
)

# Sponsor plugin
sponsorapp = Flask("Sponsors", root_path=os.path.dirname(__file__))
# this allows to work on the template without having to restart Buildbot
sponsorapp.config["TEMPLATES_AUTO_RELOAD"] = True


@sponsorapp.route("/index.html")
def main():
    # sponsor.html is a template inside the template directory
    return render_template("sponsor.html")


c["www"]["plugins"]["wsgi_dashboards"] = (
    [  # This is a list of dashboards, you can create several
        {
            "name": "sponsor",  # as used in URLs
            "caption": "Sponsors",  # Title displayed in the UI'
            "app": sponsorapp,
            # priority of the dashboard in the left menu (lower is higher in the
            # menu)
            "order": 20,
            # available icon list can be found at http://fontawesome.io/icons/
            "icon": "share-alt-square",
        }
    ]
)

####### GitHub hooks

# GitHub webhook receiver
c["www"]["change_hook_dialects"] = {
    "github": {
        "secret": config["private"]["gh_secret"],
        "strict": True,
    }
}

c["www"]["ui_default_config"] = {
    "Grid.changeFetchLimit": 5,
    "Grid.buildFetchLimit": 50,
}


def upstream_branch_fn(branch):
    return (
        branch in BRANCHES_MAIN
        or fnmatch.fnmatch(branch, "bb-*")
        or fnmatch.fnmatch(branch, "st-*")
        or fnmatch.fnmatch(branch, "prot-*")
        or fnmatch.fnmatch(branch, "refs/pull/*")
        or fnmatch.fnmatch(branch, "preview-1[0-9].*")
        or fnmatch.fnmatch(branch, "jpsn-*")
    )


def staging_branch_fn(branch):
    return fnmatch.fnmatch(branch, "st-*")


def fnmatch_any(s, list_of_patterns):
    return any(fnmatch.fnmatch(s, p) for p in list_of_patterns)


# Override schedulers
c["schedulers"] = []

# upstream scheduling
schedulerTarball = schedulers.AnyBranchScheduler(
    name="s_upstream_tarball",
    change_filter=util.ChangeFilter(
        repository="https://github.com/MariaDB/server", branch_fn=upstream_branch_fn
    ),
    treeStableTimer=60,
    builderNames=["tarball-docker"],
)
c["schedulers"].append(schedulerTarball)

if os.getenv("ENVIRON") == "DEV":
    schedulerTarball = schedulers.AnyBranchScheduler(
        name="s_faust_tarball",
        change_filter=util.ChangeFilter(
            repository="https://github.com/fauust/mariadb-server",
            branch_fn=upstream_branch_fn,
        ),
        treeStableTimer=60,
        builderNames=["tarball-docker"],
    )
    c["schedulers"].append(schedulerTarball)
