# -*- python -*-
# ex: set filetype=python:

import os
from collections import defaultdict

import yaml

from buildbot.plugins import steps, util
from buildbot.process.properties import Property
from common_factories import (
    getQuickBuildFactory,
    getRpmAutobakeFactory,
    getSourceTarball,
)
from constants import (
    GITHUB_STATUS_BUILDERS,
    SAVED_PACKAGE_BRANCHES,
    os_info,
)
from locks import getLocks
from master_common import base_master_config
from utils import (
    canStartBuild,
    createDebRepo,
    createWorker,
    dockerfile,
    hasDockerLibrary,
    hasFiles,
    hasInstall,
    hasUpgrade,
    ls2string,
    nextBuild,
    printEnv,
    savePackage,
    uploadDebArtifacts,
)

with open("master-config.yaml", "r") as f:
    master_config = yaml.safe_load(f)

# Load the slave, database passwords and 3rd-party tokens from an external
# private file, so that the rest of the configuration can be public.
config = {"private": {}}
exec(open("master-private.cfg").read(), config, {})

# This is the dictionary that the buildmaster pays attention to. We also use
# a shorter alias to save typing.
c = BuildmasterConfig = base_master_config(
    title=os.getenv("TITLE", default="MariaDB CI"),
    title_url=os.getenv("TITLE_URL",
                        default="https://github.com/MariaDB/server"),
    buildbot_url=os.getenv("BUILDMASTER_URL",
                           default="https://buildbot.mariadb.org/"),
    github_access_token=config["private"]["gh_mdbci"]["access_token"],
    # TODO(cvicentiu) undo this hardcoding
    secrets_provider_file="/srv/buildbot/master/master-credential-provider",
    master_port=int(os.getenv("PORT", default=master_config["port"])),
    db_url=config["private"]["db_url"],
    mq_router_url=os.getenv("MQ_ROUTER_URL", default="ws://localhost:8085/ws"))


#######
# DB URL
#######
mtrDbPool = util.EqConnectionPool(
    "MySQLdb",
    config["private"]["db_host"],
    config["private"]["db_user"],
    config["private"]["db_password"],
    config["private"]["db_mtr_db"],
)

#########
# WORKERS
#########

# The 'workers' list defines the set of recognized workers. Each element is
# a Worker object, specifying a unique worker name and password.  The same
# worker name and password must be configured on the worker.
c["workers"] = []

# Docker workers

workers = defaultdict(list)

print('Loading workers')
print(os.environ)
for w_name in master_config["workers"]:
    jobs = 7
    print(w_name)

    for arch in master_config["builders"]:
        builders = master_config["builders"][arch]
        for builder in builders:
            print('Loading workers builder', builder)
            worker_name = w_name[:-1]
            worker_id = w_name[-1]

            os_name = "-".join(builder.split("-")[1:])
            image_tag = "".join(os_name.split("-"))

            # Skip s390x non-SLES builders on SLES host (bbw2)
            if ("s390x" in builder) and (worker_id == "2") and ("sles" not in os_name):
                continue

            if image_tag.startswith("ubuntu"):
                image_tag = image_tag[:-2] + "." + image_tag[-2:]

            quay_name = f'{os.environ["CONTAINER_REGISTRY_URL"]}{image_tag}'
            if builder.startswith("x86"):
                os_name += "-i386"
                quay_name += "-386"

            base_name, name, worker_instance = createWorker(
                worker_name,
                worker_id,
                os_name,
                quay_name,
                jobs=jobs,
                save_packages=True,
                shm_size="15G",
            )

            print(base_name)

            workers[base_name].append(name)
            c["workers"].append(worker_instance)

print('WORKERS LOADED: ', workers)

####### FACTORY CODE

f_quick_build = getQuickBuildFactory("nm", mtrDbPool)
f_rpm_autobake = getRpmAutobakeFactory(mtrDbPool)

f_deb_autobake = util.BuildFactory()
f_deb_autobake.addStep(printEnv())
f_deb_autobake.addStep(
    steps.SetProperty(
        property="dockerfile",
        value=util.Interpolate("%(kw:url)s", url=dockerfile),
        description="dockerfile",
    )
)
f_deb_autobake.addStep(getSourceTarball())
# build steps
f_deb_autobake.addStep(
    steps.Compile(
        logfiles={"CMakeCache.txt": "./builddir/CMakeCache.txt"},
        command=["debian/autobake-deb.sh"],
        env={
            "CCACHE_DIR": "/mnt/ccache",
            "DEB_BUILD_OPTIONS": util.Interpolate(
                "parallel=%(kw:jobs)s",
                jobs=util.Property("jobs", default="$(getconf _NPROCESSORS_ONLN)"),
            ),
        },
        description="autobake-deb.sh",
    )
)
# upload artifacts
f_deb_autobake.addStep(
    steps.SetPropertyFromCommand(
        command="find .. -maxdepth 1 -type f", extract_fn=ls2string
    )
)
f_deb_autobake.addStep(createDebRepo())
f_deb_autobake.addStep(uploadDebArtifacts())

f_deb_autobake.addStep(
    steps.Trigger(
        name="dockerlibrary",
        schedulerNames=["s_dockerlibrary"],
        waitForFinish=False,
        updateSourceStamp=False,
        set_properties={
            "tarbuildnum": Property("tarbuildnum"),
            "mariadb_version": Property("mariadb_version"),
            "master_branch": Property("master_branch"),
            "parentbuildername": Property("buildername"),
        },
        doStepIf=lambda step: hasDockerLibrary(step),
    )
)
f_deb_autobake.addStep(
    steps.Trigger(
        name="release preparation",
        schedulerNames=["s_release_prep"],
        waitForFinish=True,
        updateSourceStamp=False,
        set_properties={
            "tarbuildnum": Property("tarbuildnum"),
            "mariadb_version": Property("mariadb_version"),
            "master_branch": Property("master_branch"),
            "parentbuildername": Property("buildername"),
        },
        doStepIf=lambda step: savePackage(step, SAVED_PACKAGE_BRANCHES),
    )
)
f_deb_autobake.addStep(
    steps.Trigger(
        name="install",
        schedulerNames=["s_install"],
        waitForFinish=False,
        updateSourceStamp=False,
        set_properties={
            "tarbuildnum": Property("tarbuildnum"),
            "mariadb_version": Property("mariadb_version"),
            "master_branch": Property("master_branch"),
            "parentbuildername": Property("buildername"),
        },
        doStepIf=lambda step: hasInstall(step) and savePackage(step, SAVED_PACKAGE_BRANCHES) and hasFiles(step),
    )
)
f_deb_autobake.addStep(
    steps.Trigger(
        name="major-minor-upgrade",
        schedulerNames=["s_upgrade"],
        waitForFinish=False,
        updateSourceStamp=False,
        set_properties={
            "tarbuildnum": Property("tarbuildnum"),
            "mariadb_version": Property("mariadb_version"),
            "master_branch": Property("master_branch"),
            "parentbuildername": Property("buildername"),
        },
        doStepIf=lambda step: hasUpgrade(step) and savePackage(step, SAVED_PACKAGE_BRANCHES) and hasFiles(step),
    )
)
f_deb_autobake.addStep(
    steps.ShellCommand(
        name="cleanup", command="rm -r * .* 2> /dev/null || true", alwaysRun=True
    )
)

####### BUILDERS LIST

c["builders"] = []
print('workers: ', workers)

for arch in master_config["builders"]:
    builders_group = master_config["builders"][arch]
    print('Builders group: ', builders_group)
    for os_name in builders_group:
        worker_prefix = arch
        worker_suffix = ''

        if arch == "amd64":
            worker_prefix = "x64"

        if arch == "x86":
            worker_prefix = 'x64'
            worker_suffix = '-i386'
        worker_name = f'{worker_prefix}-bbw-docker-{os_name}{worker_suffix}'

        build_type = os_info[os_name]["type"]

        builder = f'{arch}-{os_name}'
        print('builder: ', builder)
        print(f'Looking for builder the worker: {worker_name}')

        tags = [os_name]
        # Add builder only if it's not a protected branches one
        if builder not in GITHUB_STATUS_BUILDERS:
            c["builders"].append(
                util.BuilderConfig(
                    name=builder,
                    workernames=workers[worker_name],
                    tags=tags,
                    collapseRequests=True,
                    nextBuild=nextBuild,
                    canStartBuild=canStartBuild,
                    locks=getLocks,
                    factory=f_quick_build,
                )
            )

        factory_instance = f_deb_autobake if build_type != "rpm" else f_rpm_autobake
        properties = {
            "verbose_build": "VERBOSE=1" if arch == "ppc4le" else None,
            "rpm_type": "".join(os_name.split("-")) if build_type == "rpm" else None
        }

        tags += [build_type, "autobake"]

        c["builders"].append(
            util.BuilderConfig(
                name=builder + "-" + build_type + "-autobake",
                workernames=workers[worker_name],
                tags=tags,
                collapseRequests=True,
                nextBuild=nextBuild,
                canStartBuild=canStartBuild,
                locks=getLocks,
                properties=properties,
                factory=factory_instance,
            )
        )
